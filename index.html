<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미니 키오스크 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        button:hover { background-color: #0056b3; }
        
        /* 🎨 테이블을 예쁘게 꾸며주는 CSS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
        .status-completed { color: green; font-weight: bold; }
        .status-refunded { color: red; font-weight: bold; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 우리 매장 매출 대시보드</h1>
        <button onclick="getOrders()">주문 내역 불러오기!</button>
        
        <table>
            <thead>
                <tr>
                    <th>주문 번호</th>
                    <th>결제 일시</th>
                    <th>결제 수단</th>
                    <th>결제 금액</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" style="color: #888;">버튼을 눌러 데이터를 불러오세요.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function getOrders() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "<tr><td colspan='5'>데이터를 불러오는 중입니다... ⏳</td></tr>";

            // 🔥 주의: 여기에 진짜 매장 UUID를 넣어주세요!
            const storeId = "b192aed1-4d21-4e2c-9ae7-6fa875a79acf"; 
            const url = `http://127.0.0.1:8000/order/?store_id=${storeId}`;

            try {
                // 백엔드에서 데이터 가져오기
                const response = await fetch(url);
                const data = await response.json();

                // 3. 기존 테이블 내용을 비우기
                tbody.innerHTML = "";

                if(data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5'>조회된 주문 내역이 없습니다.</td></tr>";
                    return;
                }

                // 4. 🔥 핵심: 배열(리스트)을 돌면서 HTML 표(<tr>)를 하나씩 만들어 붙임!
                data.forEach(order => {
                    // 날짜를 보기 좋게 포맷팅
                    const dateObj = new Date(order.created_date);
                    const formattedDate = dateObj.toLocaleString('ko-KR');

                    // 상태에 따라 색상 클래스 적용
                    const statusClass = order.status === "REFUNDED" ? "status-refunded" : "status-completed";

                    // 표의 한 줄(tr)을 생성
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td># ${order.id}</td>
                        <td>${formattedDate}</td>
                        <td>${order.payment_method}</td>
                        <td>${order.total_amount.toLocaleString()} 원</td>
                        <td class="${statusClass}">${order.status}</td>
                    `;
                    // 만들어진 줄을 테이블에 추가!
                    tbody.appendChild(tr);
                });
                
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan='5' style='color:red;'>에러가 발생했습니다: ${error}</td></tr>`;
            }
        }
    </script>

</body>
</html>
